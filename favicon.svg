<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hintergrund -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="70%" r="70%">
      <stop offset="0%" style="stop-color:#cc2200;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a0a00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Hintergrundkreis -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)" />

  <!-- Glüh-Effekt -->
